name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore
        run: nuget restore MyAdminExplorer.sln

      - name: Build Release
        run: msbuild MyAdminExplorer.sln /p:Configuration=Release /v:m

      - name: Test
        run: dotnet test MyAdminExplorer.Tests\MyAdminExplorer.Tests.csproj -c Release --no-build --verbosity normal

      - name: Package release zip
        run: |
          $out = "artifacts\MyAdminExplorer"
          New-Item -ItemType Directory -Force -Path $out | Out-Null
          Copy-Item -Recurse MyAdminExplorer\bin\Release\* $out
          Compress-Archive -Path $out -DestinationPath artifacts\MyAdminExplorer.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MyAdminExplorer-Release
          path: artifacts/MyAdminExplorer.zip
